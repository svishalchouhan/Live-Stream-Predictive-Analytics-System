# docker-compose.yml
# -------------------
# Spins up a single-node Kafka cluster (Zookeeper + Kafka broker).
# Required ONLY when running with:  python main.py --mode kafka
#
# Usage
# -----
#   Start :  docker compose up -d
#   Stop  :  docker compose down
#   Logs  :  docker compose logs -f kafka

version: "3.9"

services:

  # ---------------------------------------------------------------- #
  # Zookeeper — Kafka coordination service                            #
  # ---------------------------------------------------------------- #
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------- #
  # Kafka broker                                                       #
  # ---------------------------------------------------------------- #
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"

      # Advertise on localhost so the host machine can reach the broker
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_LOG_SEGMENT_BYTES: 10485760   # 10 MB
    healthcheck:
      test:
        - "CMD"
        - "kafka-broker-api-versions"
        - "--bootstrap-server"
        - "localhost:9092"
      interval: 15s
      timeout: 10s
      retries: 5
